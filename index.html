<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; margin: 0; padding: 0; background: #f4f4f4; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        .container { width: 80%; margin: auto; overflow: hidden; padding: 2rem; background: #fff; margin-top: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .btn { display: inline-block; background: #ff4757; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        .btn:hover { background: #e84118; }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的频道</h1>
    </header>
    <div class="container">
        <h2>你好，我是 [你的名字]</h2>
        <p>这是一个用 HTML 和 CSS 编写的简单网页。你可以在这里分享你的故事、项目或联系方式。</p>
        <p>未来你可以给它添加 JavaScript 让它变得更生动！</p>
        <a href="#" class="btn">了解更多</a>
    </div>
</body>
</html>
